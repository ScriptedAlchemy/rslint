name: "🧭 TypeScript-ESLint Parity Tracking"
description: Track parity fixes for a specific parity phase
title: "[Parity]: "
type: Task
labels: ["tracking issue", "area:typescript-eslint-parity", "kind:parity"]
body:
  - type: markdown
    attributes:
      value: |
        Use the parity toolkit artifacts:
        - `typescript-eslint-rule-parity-issue-plan.md`
        - `typescript-eslint-rule-parity-worklist.md`
        - `typescript-eslint-rule-parity-summary.md`
        - Generate phase tasklist snippet:
          - `pnpm parity:ts-eslint:tasklist --phase <A_critical|B_high|C_medium|D_low>`
  - type: dropdown
    id: phase
    attributes:
      label: Parity phase
      options:
        - A_critical
        - B_high
        - C_medium
        - D_low
    validations:
      required: true
  - type: textarea
    id: tasklist
    attributes:
      label: Tasks
      description: Paste tasklist snippet generated by script
      value: |
        ```[tasklist]
        ### parity tasks
        - [ ] Paste generated tasks here
        ```
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      value: |
        - [ ] Go tests pass for touched rules.
        - [ ] JS parity tests pass for touched rules.
        - [ ] Parity artifacts regenerated.
        - [ ] `pnpm parity:ts-eslint:check` passes.
    validations:
      required: true
