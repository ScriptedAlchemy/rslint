name: parity-artifacts-check

on:
  pull_request:
    paths:
      - "typescript-eslint-rule-parity-*.md"
      - "typescript-eslint-rule-parity-*.json"
      - "typescript-eslint-rule-parity-*.csv"
      - "scripts/generate_ts_eslint_parity_*.py"
      - "scripts/compare_ts_eslint_parity_trackers.py"
      - "scripts/check_ts_eslint_parity_artifacts.py"
      - "scripts/refresh-ts-eslint-parity-artifacts.sh"
      - "typescript-eslint-rule-parity-guide.md"
      - ".github/workflows/parity-artifacts-check.yml"
  push:
    branches:
      - main
    paths:
      - "typescript-eslint-rule-parity-*.md"
      - "typescript-eslint-rule-parity-*.json"
      - "typescript-eslint-rule-parity-*.csv"
      - "scripts/generate_ts_eslint_parity_*.py"
      - "scripts/compare_ts_eslint_parity_trackers.py"
      - "scripts/check_ts_eslint_parity_artifacts.py"
      - "scripts/refresh-ts-eslint-parity-artifacts.sh"
      - "typescript-eslint-rule-parity-guide.md"
      - ".github/workflows/parity-artifacts-check.yml"

permissions:
  contents: read

jobs:
  check-parity-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate parity artifacts consistency
        run: python3 scripts/check_ts_eslint_parity_artifacts.py

      - name: Generate parity tracker diff against PR base
        if: github.event_name == 'pull_request'
        run: |
          python3 scripts/compare_ts_eslint_parity_trackers.py \
            --base-ref "origin/${{ github.base_ref }}" \
            --output "typescript-eslint-rule-parity-diff.md"

      - name: Upload parity diff artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: typescript-eslint-parity-diff
          path: typescript-eslint-rule-parity-diff.md
